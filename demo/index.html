<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeowTileKit Demo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: #0a0a12; color: #d4d4d8; height: 100vh; display: flex; flex-direction: column;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }

header {
  display: flex; align-items: center; gap: 12px; padding: 10px 18px;
  background: #0e0e18; border-bottom: 1px solid #1a1a28; flex-shrink: 0; flex-wrap: wrap;
}
header h1 {
  font-size: 15px; font-weight: 700;
  background: linear-gradient(90deg, #6c5ce7, #4a9eff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-right: 4px;
}
header .ver { color: #333; font-size: 11px; }
header .sep { color: #1e1e2e; font-size: 16px; }
header label { font-size: 12px; color: #555; }
header select, header input {
  background: #0e0e18; color: #d4d4d8; border: 1px solid #242438; border-radius: 6px;
  padding: 5px 8px; font-size: 12px; outline: none;
}
header select:focus, header input:focus { border-color: #4a9eff; }
header select { cursor: pointer; }
header input { width: 72px; font-family: "SF Mono", Menlo, monospace; }
header button {
  background: linear-gradient(135deg, #6c5ce7, #4a9eff); color: #fff; border: none;
  border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; font-weight: 600;
  transition: all .15s;
}
header button:hover { box-shadow: 0 2px 10px rgba(108,92,231,0.3); }
header button.ghost {
  background: #141420; color: #888; border: 1px solid #242438;
}
header button.ghost:hover { background: #1c1c2e; color: #bbb; box-shadow: none; }

#map { flex: 1; z-index: 1; }

/* ── bottom bar ── */
.info-bar {
  display: flex; align-items: center; gap: 14px; padding: 8px 18px;
  background: #0e0e18; border-top: 1px solid #1a1a28; flex-shrink: 0; flex-wrap: wrap;
  font-family: "SF Mono", Menlo, monospace; font-size: 12px; min-height: 40px;
}
.info-bar .tag {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
  font-weight: 700; letter-spacing: .3px;
}
.tag-w { background: rgba(26,107,60,0.25); color: #6fcf97; }
.tag-g { background: rgba(107,58,26,0.25); color: #f0ad4e; }
.tag-b { background: rgba(74,26,107,0.25); color: #bb86fc; }
.info-bar .val { color: #aaa; }
.info-bar .val strong { color: #d4d4d8; font-weight: 500; }
.info-bar .dot { color: #2a2a3e; }
.info-bar .chip { color: #555; font-size: 11px; }

/* ── popup ── */
.popup-coord {
  font: 14px/1.6 "SF Mono", Menlo, monospace; padding: 2px 0;
}
.popup-coord .row { display: flex; gap: 8px; align-items: center; white-space: nowrap; }
.popup-coord .lbl { color: #888; font-size: 12px; }
.popup-coord .pc { color: #333; font-weight: 600; }
.leaflet-popup-content { margin: 8px 10px !important; }
.leaflet-popup-content-wrapper { border-radius: 8px !important; }
.leaflet-popup-tip { box-shadow: none !important; }

/* ── toast ── */
.toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(108,92,231,0.95); color: #fff; padding: 7px 18px; border-radius: 8px;
  font-size: 13px; z-index: 99999; pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  animation: fadeUp 1.4s ease forwards;
}
@keyframes fadeUp {
  0% { opacity: 1; transform: translateX(-50%) translateY(0); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-14px); }
}

@media (max-width: 700px) {
  header { padding: 6px 10px; gap: 6px; }
  header label { display: none; }
  header input { width: 56px; font-size: 11px; }
  header select { font-size: 11px; padding: 4px 6px; }
  header button { font-size: 11px; padding: 4px 10px; }
  .info-bar { font-size: 11px; gap: 8px; padding: 6px 10px; }
  .info-bar .dot { display: none; }
}
</style>
</head>
<body>

<header>
  <h1>MeowTileKit</h1>
  <span class="ver">v0.1.0</span>
  <span class="sep">·</span>
  <label>地图源</label>
  <select id="src"></select>
  <span class="sep">·</span>
  <label>纬度</label><input id="lat-in" value="39.9042">
  <label>经度</label><input id="lng-in" value="116.4074">
  <button id="locate-btn">定位</button>
  <button class="ghost" id="mypos-btn">我的位置</button>
</header>

<div id="map"></div>

<footer class="info-bar" id="info-bar">
  <span>点击地图查看坐标</span>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../package/dist/index.global.js"></script>
<script>
(function() {
'use strict';
const tk = window.MeowTileKit;
if (!tk) { document.body.innerHTML = 'MeowTileKit 加载失败'; return; }

const { createMap, createTileSource, wgs84ToGcj02, wgs84ToBd09, isInChina, latLngToTile, presets } = tk;

// ── build preset selector ──
const sel = document.getElementById('src');
const groups = {};
presets.forEach(p => (groups[p.group] ??= []).push(p));
Object.entries(groups).forEach(([g, items]) => {
  const opt = document.createElement('optgroup');
  opt.label = g;
  items.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.label;
    if (p.id === 'amap') o.selected = true;
    opt.appendChild(o);
  });
  sel.appendChild(opt);
});

// ── init map ──
let curSrc = null;
const { map, source, toLocal } = createMap('map', { source: 'amap', zoom: 12 });
curSrc = source;

const marker = L.marker([39.9042, 116.4074], { draggable: true }).addTo(map);

function switchSource(key) {
  const src = createTileSource(key);
  if (!src) return;
  map.eachLayer(l => { if (l.getTileUrl) map.removeLayer(l); });
  curSrc = src;
  const layer = L.tileLayer('', {
    tileSize: src.tileSize, maxZoom: src.maxZoom, minZoom: src.minZoom,
    attribution: src.attribution,
  });
  layer.getTileUrl = (c) => src.getTileUrl(c);
  map.addLayer(layer);
  const p = marker.getLatLng();
  const c = toLocal(p.lat, p.lng);
  map.setView(c, map.getZoom());
  updateBar(p.lat, p.lng);
}
sel.addEventListener('change', e => switchSource(e.target.value));

// ── popup ──
function popupHTML(lat, lng) {
  const gcj = wgs84ToGcj02(lat, lng);
  return '<div class="popup-coord">' +
    '<div class="row"><span class="lbl">WGS-84</span><span class="pc">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</span></div>' +
    '<div class="row"><span class="lbl">GCJ-02</span><span class="pc">' + gcj.lat.toFixed(6) + ', ' + gcj.lng.toFixed(6) + '</span></div>' +
    '<div class="row"><span class="lbl">' + curSrc.name + '</span><span class="pc" style="color:#888;font-size:12px">' + curSrc.coordSystem + '</span></div>' +
  '</div>';
}

marker.on('dragend', () => {
  const p = marker.getLatLng();
  document.getElementById('lat-in').value = p.lat.toFixed(6);
  document.getElementById('lng-in').value = p.lng.toFixed(6);
  updateBar(p.lat, p.lng);
  if (marker.isPopupOpen()) marker.setPopupContent(popupHTML(p.lat, p.lng));
});

map.on('click', e => {
  const { lat, lng } = e.latlng;
  document.getElementById('lat-in').value = lat.toFixed(6);
  document.getElementById('lng-in').value = lng.toFixed(6);
  marker.setLatLng([lat, lng]);
  marker.bindPopup(popupHTML(lat, lng)).openPopup();
  updateBar(lat, lng);
});

// ── bottom bar ──
function updateBar(lat, lng) {
  const gcj = wgs84ToGcj02(lat, lng);
  const bd = wgs84ToBd09(lat, lng);
  const inCn = isInChina(lat, lng);
  const tile = latLngToTile(lat, lng, map.getZoom());
  document.getElementById('info-bar').innerHTML =
    '<span class="tag tag-w">WGS-84</span>' +
    '<span class="val"><strong>' + lat.toFixed(6) + '</strong>, <strong>' + lng.toFixed(6) + '</strong></span>' +
    '<span class="dot">·</span>' +
    '<span class="tag tag-g">GCJ-02</span>' +
    '<span class="val"><strong>' + gcj.lat.toFixed(6) + '</strong>, <strong>' + gcj.lng.toFixed(6) + '</strong></span>' +
    '<span class="dot">·</span>' +
    '<span class="tag tag-b">BD-09</span>' +
    '<span class="val"><strong>' + bd.lat.toFixed(6) + '</strong>, <strong>' + bd.lng.toFixed(6) + '</strong></span>' +
    '<span class="dot">·</span>' +
    '<span class="chip">' + (inCn ? '境内' : '境外') + '</span>' +
    '<span class="chip">瓦片 ' + tile.z + '/' + tile.x + '/' + tile.y + '</span>' +
    '<span class="chip">缩放 ' + map.getZoom() + '</span>';
}

// ── locate ──
document.getElementById('locate-btn').addEventListener('click', () => {
  const lat = +document.getElementById('lat-in').value;
  const lng = +document.getElementById('lng-in').value;
  if (isNaN(lat) || isNaN(lng)) return;
  const c = toLocal(lat, lng);
  map.setView(c, map.getZoom());
  marker.setLatLng([lat, lng]);
  marker.bindPopup(popupHTML(lat, lng)).openPopup();
  updateBar(lat, lng);
});
document.getElementById('lat-in').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('locate-btn').click(); });
document.getElementById('lng-in').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('locate-btn').click(); });

// ── my position ──
document.getElementById('mypos-btn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('浏览器不支持定位'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const c = toLocal(lat, lng);
      map.setView(c, 15);
      document.getElementById('lat-in').value = lat.toFixed(6);
      document.getElementById('lng-in').value = lng.toFixed(6);
      marker.setLatLng([lat, lng]);
      marker.bindPopup(popupHTML(lat, lng)).openPopup();
      updateBar(lat, lng);
    },
    () => alert('定位失败'),
    { enableHighAccuracy: true, timeout: 8000 },
  );
});

// ── init ──
})();
</script>
</body>
</html>
